<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #131313;
            color: #C8C8C8; /* 设置整体文本颜色 */
            font-family: Arial, sans-serif; /* 设置字体 */
            text-align: center; /* 将文本居中 */
            padding: 20px; /* 添加内边距增加内容的可读性 */
        }

        header, main, footer {
            margin: 0 auto; /* 居中显示 */
            max-width: 600px; /* 设置最大宽度 */
        }

        header h1 {
            color: #C8C8C8; /* 设置标题颜色 */
        }

        main p {
            /* 可以根据需要设置内容段落的样式 */
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            background-color: #1F1F1F;
        }

        .link-container {
            display: inline-block;
            margin: 10px; /* 设置链接之间的间距 */
        }

        .link-container a {
            display: block;
            padding: 10px;
            background-color: #333; /* 设置链接的背景色 */
            color: #C8C8C8;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>[标题]</h1>
    </header>

    <main>
        <p>[内容]</p>
    </main>

    <footer>
        <div class="link-container">
            <a href="https://github.com/zetsr/" target="_blank">Github</a>
        </div>
        <div class="link-container">
            <a href="https://server.wyvern.world/" target="_blank">Server</a>
        </div>
        <div class="link-container">
            <a href="https://steamcommunity.com/id/zetsr/" target="_blank">Steam</a>
        </div>
    </footer>
</body>
</html>
