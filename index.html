<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #131313;
            color: #C8C8C8; /* 设置整体文本颜色 */
            font-family: Arial, sans-serif; /* 设置字体 */
            text-align: center; /* 将文本居中 */
            padding: 20px; /* 添加内边距增加内容的可读性 */
        }

        header, main, footer {
            margin: 0 auto; /* 居中显示 */
            max-width: 600px; /* 设置最大宽度 */
        }

        header h1 {
            color: #C8C8C8; /* 设置标题颜色 */
        }

        main p {
            /* 可以根据需要设置内容段落的样式 */
        }

        footer {
            border-radius: 10px; /* 设置圆角边框 */
            position: center;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            background-color: #1F1F1F;
        }

        .link-container {
            display: inline-block;
            margin: 10px; /* 设置链接之间的间距 */
        }

        .link-container a {
            display: block;
            padding: 10px;
            background-color: #333; /* 设置链接的背景色 */
            color: #C8C8C8;
            text-decoration: none;
            border-radius: 5px;
        }

        /* 添加代码框样式 */
        pre {
            background-color: #1F1F1F; /* 设置代码框背景色 */
            color: #C8C8C8; /* 设置代码框文本颜色 */
            padding: 10px; /* 设置代码框内边距 */
            border-radius: 10px; /* 设置圆角边框 */
            overflow-x: auto; /* 横向滚动条 */
            font-family: 'Courier New', Courier, monospace; /* 设置代码框字体 */
            text-align: left; /* 保持代码框内文本左对齐 */
        }
    </style>
</head>
<body>
    <header>
        <h1>[标题]</h1>
    </header>

    <main>
        <p>[内容]</p>

        <!-- 代码框示例 -->
        <pre>test\n呃呃呃</pre>
    </main>

    <footer>
        <div class="link-container">
            <a href="https://github.com/zetsr/" target="_blank">Github</a>
        </div>
        <div class="link-container">
            <a href="https://server.wyvern.world/" target="_blank">Server</a>
        </div>
        <div class="link-container">
            <a href="https://steamcommunity.com/id/zetsr/" target="_blank">Steam</a>
        </div>
    </footer>

    <script>
        // 获取当前时间和地区
        function displayDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const period = hour < 12 ? '上午' : '下午';

            const formattedDateTime = `${year}年${month}月${day}日 ${period} ${hour}时${minute}分`;

            // 示例中直接写入到一个元素中
            document.getElementById('datetime').textContent = formattedDateTime;
        }

        // 在页面加载时调用函数显示时间
        displayDateTime();
    </script>
    
</body>
</html>
