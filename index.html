<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #131313;
            color: #C8C8C8; /* 设置整体文本颜色 */
            font-family: Arial, sans-serif; /* 设置字体 */
            text-align: center; /* 将文本居中 */
            padding: 20px; /* 添加内边距增加内容的可读性 */
        }

        header, main {
            margin: 0 auto; /* 居中显示 */
            max-width: 600px; /* 设置最大宽度 */
        }

        header h1 {
            color: #C8C8C8; /* 设置标题颜色 */
        }

        main p {
            /* 可以根据需要设置内容段落的样式 */
        }

        /* 添加代码框样式 */
        pre {
            background-color: #141700; /* 设置代码框背景色 */
            color: #C8C8C8; /* 设置代码框文本颜色 */
            padding: 10px; /* 设置代码框内边距 */
            border-radius: 20px; /* 设置圆角边框 */
            overflow-x: auto; /* 横向滚动条 */
            font-family: 'Courier New', Courier, monospace; /* 设置代码框字体 */
            text-align: left; /* 保持代码框内文本左对齐 */
        }
    </style>
</head>
<body>
    <header>
        <h1>[标题]</h1>
    </header>

    <main>
        <p>[内容]</p>

        <!-- 代码框示例 -->
        <pre>
            test
            呃呃呃
        </pre>
    </main>

</body>
</html>
